[build]
  command = "npm install && npm install --prefix widget && npm run build"
  publish = "dist"

# Widget iframe: allow embedding from any origin
[[headers]]
  for = "/widget/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Content-Security-Policy = "frame-ancestors *"

# Widget: explicitly serve widget index before SPA catch-all can intercept
[[redirects]]
  from = "/widget"
  to = "/widget/"
  status = 301

[[redirects]]
  from = "/widget/"
  to = "/widget/index.html"
  status = 200
  force = true

# SPA fallback for React Router (only fires for paths with no matching file)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
